name: Check SQL
description: Check changed SQL files for disallowed DROP/ALTER commands without checkout

inputs:
  github-token:
    description: GitHub token with contents read and org Members read permission
    required: true

  exempt-teams:
    description: Space-separated GitHub team slugs allowed to bypass
    required: false
    default: "dba ort"

  exempt-actors:
    description: Space-separated GitHub actors allowed to bypass
    required: false
    default: "jenkins-ci[bot]"

  exclude-paths:
    description: Comma-separated path regex fragments to exclude
    required: false
    default: ""

  utf8-bom-check:
    description: Require SQL files to start with UTF-8 BOM
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Check SQL files through GitHub API
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        EXEMPT_TEAMS: ${{ inputs.exempt-teams }}
        EXEMPT_ACTORS: ${{ inputs.exempt-actors }}
        EXCLUDE_PATHS: ${{ inputs.exclude-paths }}
        UTF8_BOM_CHECK: ${{ inputs.utf8-bom-check }}
        ACTOR: ${{ github.actor }}
        ORG: ${{ github.repository_owner }}
        REPOSITORY: ${{ github.repository }}
        EVENT_NAME: ${{ github.event_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: bash "$GITHUB_ACTION_PATH/check-sql.sh"
